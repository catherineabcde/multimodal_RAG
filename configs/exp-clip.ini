[model]
# 選擇 embedding 模型：clip, qwen
name = clip
# CLIP 不需要 model_path，留空即可
model_path =

[database]
# ChromaDB 的儲存路徑
db_path = ./db/chroma_clip
# collection 名稱
collection_name = clip_images

[data]
# 圖片資料夾路徑（page screenshots）
image_folder = ./data/figures/pages

[evaluation]
# 測試集路徑（FAQ JSON）
testset = ./Vulcan_Training_07092025.pptx_page_faq_final.json
# 檢索 top-k（可用 --top_k 命令列參數覆蓋）
top_k = 3


