[model]
# 選擇 visual embedding 模型：clip, qwen
name = qwen
# 模型名稱或路徑：
#   - HuggingFace Hub ID（自動下載）：Qwen/Qwen3-VL-Embedding-2B
#   - 本地路徑：./models/Qwen3-VL-Embedding-2B
model_path = Qwen/Qwen3-VL-Embedding-2B

[database]
# Image DB（existing）
db_path = ./db/chroma_qwen
collection_name = qwen_images
# Text DB（new）
text_db_path = ./db/chroma_text
text_collection = text_store

[data]
# 圖片資料夾路徑
image_folder = ./data/figures/pages
# 文字資料路徑（_merged.json）
text_data_path = ./data/Vulcan_Training_07092025.pptx_merged.json

[embedding]
# Text embedding model（Ollama）
# (原本是 bge-m3:latest)
model = dengcao/Qwen3-Embedding-4B:Q4_K_M
base_url = http://10.5.16.143:11434

[retrieval]
# 檢索模式：image / text / mix
mode = mix

[evaluation]
# 測試集路徑（FAQ JSON）
testset = ./data/Vulcan_Training_07092025.pptx_page_faq_final.json
# 檢索 top-k（可用 --top_k 命令列參數覆蓋）
top_k = 3

[generation]
# VLM 模型名稱（Ollama）
vlm_model = qwen3-vl:8b-instruct
# context window 大小
vlm_num_ctx = 65536
# Ollama API 位址
vlm_base_url = http://10.5.16.143:11434
# 結果輸出目錄
output_dir = ./results
